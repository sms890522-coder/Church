<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교회</title>

<script src="data.js"></script>

<link href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
:root{
  --main:#6366f1;
  --bg:#0b1120;
  --card:#111827;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}

body{background:var(--bg);color:#fff;}

header{
  position:fixed;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  transition:0.3s;
}

header.scrolled{
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

nav a{
  margin-left:15px;
  font-size:14px;
  text-decoration:none;
  color:#fff;
}

.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
  url('https://images.unsplash.com/photo-1507692049790-de58290a4334') center/cover;
  padding:0 20px;
}

.hero h1{font-size:38px;}
.hero p{margin-top:10px;opacity:0.8;}

section{
  padding:80px 20px;
  max-width:1000px;
  margin:auto;
}

h2{margin-bottom:20px;font-size:24px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:var(--main);
  border-radius:20px;
  text-decoration:none;
  color:white;
  font-size:14px;
}

footer{
  text-align:center;
  padding:30px;
  background:#020617;
  color:#888;
  font-size:13px;
}
</style>
</head>

<body>

<header id="header">
  <h3 id="church-name"></h3>
  <nav>
    <a href="#about">소개</a>
    <a href="#service">예배</a>
    <a href="#notice">공지</a>
    <a href="#location">오시는길</a>
  </nav>
</header>

<div class="hero">
  <div>
    <h1 id="slogan"></h1>
    <p>사랑과 은혜가 흐르는 공동체</p>
  </div>
</div>

<section id="about">
  <h2>교회 소개</h2>
  <p>우리 교회는 예배와 말씀, 사랑으로 세상을 섬깁니다.</p>
</section>

<section id="service">
  <h2>예배 안내</h2>
  <div class="grid" id="services"></div>
</section>

<section id="notice">
  <h2>공지사항</h2>
  <div class="grid" id="announcements"></div>
</section>

<section id="location">
  <h2>오시는 길</h2>
  <p>서울시 ○○구 ○○로 123</p>
  <a href="https://map.kakao.com/" target="_blank" class="btn">지도 보기</a>
</section>

<footer>
  © 2026 <span id="footer-name"></span>
</footer>

<script>
document.getElementById("church-name").innerText = churchData.name;
document.getElementById("footer-name").innerText = churchData.name;
document.getElementById("slogan").innerText = churchData.slogan;

const sDiv = document.getElementById("services");
churchData.services.forEach(s=>{
  sDiv.innerHTML += `<div class="card"><h3>${s.title}</h3><p>${s.time}</p></div>`;
});

const aDiv = document.getElementById("announcements");
churchData.announcements.forEach(a=>{
  aDiv.innerHTML += `<div class="card"><h3>${a.title}</h3><p>${a.date}</p></div>`;
});

// 헤더 스크롤 효과
window.addEventListener("scroll",()=>{
  const header=document.getElementById("header");
  header.classList.toggle("scrolled",window.scrollY>50);
});
</script>

</body>
</html>
