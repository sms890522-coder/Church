function toggleMenu(){
  const menu = document.getElementById("mobileMenu");
  const overlay = document.getElementById("overlay");

  const isOpen = menu.classList.contains("active");

  if(isOpen){
    menu.classList.remove("active");
    overlay.classList.remove("active");
  }else{
    menu.classList.add("active");
    overlay.classList.add("active");
  }
}

// 부드러운 스크롤 (처음 빠르고 끝에서 감속)
function smoothScroll(targetY, duration = 800){
  const startY = window.scrollY;
  const diff = targetY - startY;
  let startTime = null;

  function easeOutCubic(t){
    return 1 - Math.pow(1 - t, 3);
  }

  function step(currentTime){
    if(!startTime) startTime = currentTime;
    const time = currentTime - startTime;
    const progress = Math.min(time / duration, 1);

    const ease = easeOutCubic(progress);
    window.scrollTo(0, startY + diff * ease);

    if(time < duration){
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

window.addEventListener("scroll",()=>{

  const docHeight = document.body.scrollHeight - window.innerHeight;
  const percent = (scrollTop / docHeight) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
});
const sections = document.querySelectorAll("section");
const navLinks = document.querySelectorAll("nav a");

window.addEventListener("scroll",()=>{
  let current = "";

  sections.forEach(section=>{
    const sectionTop = section.offsetTop - 100;
    if(window.scrollY >= sectionTop){
      current = section.getAttribute("id");
    }
  });

  navLinks.forEach(link=>{
    link.classList.remove("active");
    if(link.getAttribute("href") === "#" + current){
      link.classList.add("active");
    }
  });
});

function revealOnScroll(){
  const reveals = document.querySelectorAll(".reveal");

  reveals.forEach(el=>{
    const windowHeight = window.innerHeight;
    const elementTop = el.getBoundingClientRect().top;

    if(elementTop < windowHeight - 80){
      el.classList.add("active");
    }
  });
}

// 스크롤 시 실행
window.addEventListener("scroll", revealOnScroll);

// 처음 로딩 시도 실행 (중요)
window.addEventListener("load", revealOnScroll);

// 공지 
async function loadNotices(){
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrYFfGiSePGzKwtkthZtIhyPof8cpjtApWLJEHpn9G-pLJQmz9ZLGQdBBLH1V_VbqLC4136K_BHKPr/pub?output=csv";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split(/\r?\n/).slice(1);
  const container = document.getElementById("announcements");

  container.innerHTML = "";

  rows.forEach(row=>{
    if(!row.trim()) return;

    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    const title = cols[0]?.replace(/"/g,"").trim();
    const date = cols[1]?.replace(/"/g,"").trim();
    const content = cols[2]?.replace(/"/g,"").trim();
    const link = cols[3]?.replace(/"/g,"").trim();
    const visible = cols[4]?.replace(/"/g,"").trim();

    if(visible !== "Y") return;

    container.innerHTML += `
  <div class="card reveal" onclick="openModal(
    '${title}',
    '${date}',
    '${content}',
    '${link}'
  )">
    <h3>${title}</h3>
    <p>${date}</p>
    ${content ? `<small>${content}</small>` : ""}
  </div>
`;
    
  });
}

document.addEventListener("click", function(e){
  const link = e.target.closest('a');

  if(!link) return;

  const href = link.getAttribute("href");

  // 외부 링크는 건들지 않음
  if(!href || !href.startsWith("#")) return;

  const target = document.querySelector(href);
  if(!target) return;

  e.preventDefault();

  const headerHeight = document.querySelector("header").offsetHeight;

  const targetY = target.getBoundingClientRect().top + window.scrollY - headerHeight;

  // 메뉴 닫기
  document.getElementById("mobileMenu").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");

  window.scrollTo({
    top: targetY,
    behavior: "smooth"
  });
});

document.getElementById("topBtn").addEventListener("click", ()=>{

    behavior:"smooth"

});

document.addEventListener("DOMContentLoaded", loadNotices);


  function openModal(title, date, content, link){
  document.getElementById("modal").style.display = "flex";

  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalDate").innerText = date;
  document.getElementById("modalBody").innerText = content;

  const linkBtn = document.getElementById("modalLink");

    linkBtn.href = link;
    linkBtn.classList.add("link-btn");
  }else{
    linkBtn.style.display = "none";
    linkBtn.classList.remove("link-btn");
  }
}
