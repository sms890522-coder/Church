<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리교회</title>

<script src="data.js"></script>

<link href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
:root{
  --main:#6366f1;
  --bg:#0b1120;
  --card:#111827;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}

body{background:var(--bg);color:#fff;line-height:1.6;}

header{
  position:fixed;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  transition:0.3s;
}

header.scrolled{
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

/* 네비 */
nav{
  display:flex;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#fff;
  font-size:14px;
}

/* 햄버거 */
.menu-toggle{
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* 모바일 메뉴 */
.mobile-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:70%;
  height:100%;
  background:#020617;
  padding:40px;
  transition:0.3s;
}

.mobile-menu.active{
  right:0;
}

.mobile-menu a{
  display:block;
  margin:20px 0;
  color:#fff;
  text-decoration:none;
}

/* 히어로 */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1507692049790-de58290a4334') center/cover;
  padding:0 20px;
}

.hero h1{font-size:40px;}
.hero p{margin-top:10px;opacity:0.8;}

section{
  padding:90px 20px;
  max-width:1000px;
  margin:auto;
}

h2{
  margin-bottom:25px;
  font-size:26px;
  font-weight:600;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
}

.card{
  background:var(--card);
  padding:22px;
  border-radius:14px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

.map{
  width:100%;
  height:300px;
  border-radius:12px;
  overflow:hidden;
  margin-top:15px;
}

footer{
  text-align:center;
  padding:30px;
  background:#020617;
  color:#888;
  font-size:13px;
}

/* 📱 반응형 */
@media(max-width:768px){
  nav{display:none;}
  .menu-toggle{display:block;}
  .hero h1{font-size:28px;}
}
</style>
</head>

<body>

<header id="header">
  <h3 id="church-name"></h3>
  <nav>
    <a href="#about">소개</a>
    <a href="#service">예배</a>
    <a href="#notice">공지</a>
    <a href="#location">오시는길</a>
  </nav>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- 모바일 메뉴 -->
<div class="mobile-menu" id="mobileMenu">
  <a href="#about" onclick="toggleMenu()">소개</a>
  <a href="#service" onclick="toggleMenu()">예배</a>
  <a href="#notice" onclick="toggleMenu()">공지</a>
  <a href="#location" onclick="toggleMenu()">오시는길</a>
</div>

<div class="hero">
  <div>
    <h1 id="slogan"></h1>
    <p>사랑과 은혜가 흐르는 공동체</p>
  </div>
</div>

<section id="about">
  <h2>교회 소개</h2>
  <p>우리는 예배와 말씀, 사랑으로 세상을 섬깁니다.</p>
</section>

<section id="service">
  <h2>예배 안내</h2>
  <div class="grid" id="services"></div>
</section>

<section id="notice">
  <h2>공지사항</h2>
  <div class="grid" id="announcements"></div>
</section>

<section id="location">
  <h2>오시는 길</h2>
  <p>서울시 ○○구 ○○로 123</p>

  <div class="map">
    <iframe src="https://map.kakao.com/link/map/서울시청,37.5665,126.9780"
    width="100%" height="100%" style="border:0;"></iframe>
  </div>
</section>

<footer>
  © 2026 <span id="footer-name"></span>
</footer>

<script>
document.getElementById("church-name").innerText = churchData.name;
document.getElementById("footer-name").innerText = churchData.name;
document.getElementById("slogan").innerText = churchData.slogan;

// 데이터 렌더링
const sDiv = document.getElementById("services");
churchData.services.forEach(s=>{
  sDiv.innerHTML += `<div class="card"><h3>${s.title}</h3><p>${s.time}</p></div>`;
});

const aDiv = document.getElementById("announcements");
churchData.announcements.forEach(a=>{
  aDiv.innerHTML += `<div class="card"><h3>${a.title}</h3><p>${a.date}</p></div>`;
});

// 스크롤 헤더
window.addEventListener("scroll",()=>{
  const header=document.getElementById("header");
  header.classList.toggle("scrolled",window.scrollY>50);
});

// 모바일 메뉴
function toggleMenu(){
  document.getElementById("mobileMenu").classList.toggle("active");
}
// 부드러운 스크롤 (처음 빠르고 끝에서 감속)
function smoothScroll(targetY, duration = 800){
  const startY = window.scrollY;
  const diff = targetY - startY;
  let startTime = null;

  function easeOutCubic(t){
    return 1 - Math.pow(1 - t, 3);
  }

  function step(currentTime){
    if(!startTime) startTime = currentTime;
    const time = currentTime - startTime;
    const progress = Math.min(time / duration, 1);

    const ease = easeOutCubic(progress);
    window.scrollTo(0, startY + diff * ease);

    if(time < duration){
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

// 메뉴 클릭 시 스크롤 적용
document.querySelectorAll('a[href^="#"]').forEach(link=>{
  link.addEventListener("click", function(e){
    e.preventDefault();

    const target = document.querySelector(this.getAttribute("href"));
    if(!target) return;

    const offset = 60; // 헤더 높이 보정
    const targetY = target.offsetTop - offset;

    smoothScroll(targetY, 900);
  });
});

</script>

</body>
</html>
